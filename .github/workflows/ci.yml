name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Syntax check
        run: python3 -m py_compile fan_control.py

      - name: Lint
        run: ruff check .
