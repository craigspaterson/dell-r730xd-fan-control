# Dell R730xd Fan Control Configuration
# Deployed to: /etc/dell-fan-control/config.yaml

# How often to check temperatures and adjust fans (seconds)
polling_interval_seconds: 30

# Heartbeat file path — updated each poll cycle
# Used by watchdog to detect if the daemon has stalled
heartbeat_file: /var/run/fan_control.heartbeat

# Logging
log_level: INFO   # DEBUG, INFO, WARNING, ERROR
log_file: /var/log/dell-fan-control.log

# IPMI commands for fan control
# These are specific to Dell PowerEdge R730/R730xd
fan:
  # Disable iDRAC automatic fan control
  manual_control_command: "ipmitool raw 0x30 0x30 0x01 0x00"

  # Set fan speed — {hex_speed} is replaced at runtime
  set_speed_command: "ipmitool raw 0x30 0x30 0x02 0xff {hex_speed}"

  # Re-enable iDRAC automatic fan control (used on clean daemon exit)
  restore_auto_command: "ipmitool raw 0x30 0x30 0x01 0x01"

  # Tell iDRAC a third-party PCIe card is installed
  third_party_pcie_command: "ipmitool raw 0x30 0xce 0x00 0x16 0x05 0x00 0x00 0x00 0x05 0x00 0x01 0x00 0x00"

# Temperature sources and fan speed thresholds.
# Fan speed is set to the maximum speed required by any source.
# Each source evaluates its threshold table independently (ascending order, first match wins).
#
# WARNING: Setting fan speeds too low for your workload can cause thermal
# damage. Verify your safe operating temperatures before reducing any values
# below the defaults.
#
# Fan percent reference:
#   0x1e = 30%  (quiet idle)
#   0x32 = 50%  (light load)
#   0x46 = 70%  (moderate load)
#   0x59 = 85%  (heavy load)
#   0x64 = 100% (emergency)
#
sources:
  gpu:
    # Fan speed when GPU temperature cannot be read
    failure_fallback_percent: 80
    thresholds:
      - max_temp: 50
        fan_percent: 30
        label: idle

      - max_temp: 65
        fan_percent: 50
        label: light

      - max_temp: 75
        fan_percent: 70
        label: moderate

      - max_temp: 85
        fan_percent: 85
        label: heavy

      - max_temp: 999
        fan_percent: 100
        label: emergency

  cpu:
    # Sensor names from `ipmitool sdr type Temperature` — max across all is used
    sensors:
      - "CPU1 Temp"
      - "CPU2 Temp"
    # Fan speed when CPU temperature cannot be read
    failure_fallback_percent: 80
    thresholds:
      # E5-2690 v3 Tjmax is 90°C — these thresholds give a 10°C safety margin at emergency
      - max_temp: 45
        fan_percent: 30
        label: idle

      - max_temp: 60
        fan_percent: 50
        label: light

      - max_temp: 70
        fan_percent: 70
        label: moderate

      - max_temp: 80
        fan_percent: 85
        label: heavy

      - max_temp: 999
        fan_percent: 100
        label: emergency
